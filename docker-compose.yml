services:
  workspace:
    container_name: ai-prison-workspace
    build: .
    image: ai-prison-env
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"
      - "8001:8001"
    working_dir: /workspace
    command: sleep infinity
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
