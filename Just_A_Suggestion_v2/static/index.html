<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just a Suggestion | 只是一個建議</title>
    <link rel="stylesheet" href="style_v21_final.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
</head>
    <!-- 全域降雨效果層 -->
    <canvas id="rain-canvas" style="position: fixed; inset: 0; z-index: 600; pointer-events: none; opacity: 0.4;"></canvas>

    <div id="overlay">
        <!-- 全螢幕動態影片背景 -->
        <video id="cover-video" autoplay muted loop playsinline style="
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.5) contrast(1.2) grayscale(0.2);
            z-index: 0;
        ">
            <source src="assets/video.mp4" type="video/mp4">
        </video>

        <!-- 腦內聲音雜訊：局部掃描線效果 (位於畫面中上方) -->
        <div class="consciousness-glitch" style="
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            width: 300px; height: 300px;
            background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(255,255,255,0.03) 1px, rgba(255,255,255,0.03) 2px);
            z-index: 1; pointer-events: none;
            mask-image: radial-gradient(circle, black 30%, transparent 70%);
            mix-blend-mode: overlay;
        "></div>

        <!-- 畫面暈影 (Vignetting) -->
        <div style="
            position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.7) 100%);
            z-index: 2; pointer-events: none;
        "></div>

        <!-- [文字錯位佈局] -->
        
        <!-- 左上角低語 -->
        <div style="
            position: absolute; top: 8vh; left: 6vw; z-index: 5;
            color: rgba(120, 120, 120, 0.5);
            font-family: 'EB Garamond', serif; font-style: italic;
            font-size: 0.85rem; letter-spacing: 5px;
            animation: text-float 8s ease-in-out infinite;
        ">那個聲音⋯⋯</div>

        <!-- 右下角回響 -->
        <div style="
            position: absolute; bottom: 12vh; right: 8vw; z-index: 5;
            color: rgba(120, 120, 120, 0.5);
            font-family: 'EB Garamond', serif; font-style: italic;
            font-size: 0.85rem; letter-spacing: 5px;
            animation: text-float 8s ease-in-out infinite reverse;
        ">⋯⋯是你，還是我？</div>

        <!-- 核心內容區 -->
        <div style="
            position: relative; z-index: 4;
            display: flex; flex-direction: column; align-items: center;
            height: 100%; width: 100%;
        ">
            <!-- [響應式標題] 寬屏單行，豎屏雙行 -->
            <div style="margin-top: 35vh; width: 100%; text-align: center; padding: 0 5vw; box-sizing: border-box;">
                <div class="title-ink-wrapper">
                    <h1 class="ink-title">
                        JUST A<br class="br-mobile"> SUGGESTION
                    </h1>
                </div>
            </div>

            <!-- [去框化按鈕] -->
            <div style="margin-top: auto; padding-bottom: 10vh;">
                <button class="btn-terminal" onclick="startGame()">
                    [ 建立連線 ]
                </button>
            </div>
        </div>
    </div>

    <div id="game-container" style="border: none; box-shadow: none; padding: 0; width: 100vw; height: 100vh; max-width: none;">
        <!-- 儀表板改為隱藏狀態，保留 DOM 供 JS 更新數據，但不再顯示 -->
        <header id="monitor-dashboard" style="display: none;"></header>

        <div id="scene-container" style="flex: 1; border: none; margin: 0; max-height: none; background: #000;">
            <!-- 移除 OSD 條 -->
            <div id="monitor-osd-bar" style="display: none;"></div>
            
            <img id="scene-image" src="" alt="Game Scene" style="mask-image: radial-gradient(circle, black 60%, transparent 95%); -webkit-mask-image: radial-gradient(circle, black 60%, transparent 95%); filter: contrast(1.1) brightness(0.9); object-fit: cover;">
            <div id="memory-fragment"></div>
            <div class="vignette" style="background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%);"></div>
            <div id="noise-layer"></div>
            <div class="panel-border" style="display: none;"></div>
        </div>

        <div id="dialogue-box" style="background: transparent; border: none; text-align: center; padding: 20px 10%; margin-bottom: 20px;">
            <div id="status-indicator" style="font-family: 'Courier New', monospace; font-size: 0.6rem; color: rgba(255,255,255,0.1); letter-spacing: 5px; margin-bottom: 10px;">[SYNCED]</div>
            <div id="speaker" style="font-family: 'Courier New', monospace; color: #444; font-size: 0.75rem; letter-spacing: 6px; margin-bottom: 15px; text-transform: uppercase;">青年</div>
            <p id="text-content" style="font-family: 'EB Garamond', serif; font-size: 1.25rem; line-height: 1.8; color: #999; font-style: italic; text-shadow: 0 0 20px rgba(0,0,0,1);">......</p>
        </div>
        <p id="narrator-text" style="color: #333; text-align: center; font-size: 0.75rem; letter-spacing: 2px; font-style: italic;"></p>

        <div id="input-area" style="width: 50%; max-width: 500px; margin: 0 auto 50px auto; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px 0;">
            <input type="text" id="suggestion-input" placeholder="在影子的深處，你正想著..." autocomplete="off" style="background: transparent; border: none; color: #fff; font-family: 'Courier New', monospace; font-size: 0.9rem; padding: 10px; width: 100%; outline: none; letter-spacing: 2px;">
            <button id="submit-btn" onclick="sendSuggestion()" style="background: transparent; border: none; color: #444; font-family: 'Courier New', monospace; letter-spacing: 4px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem;">Enter</button>
        </div>
        
        <div id="inventory-display" style="margin-top: 10px; font-size: 0.8rem; color: #555;">
            物品: <span id="inventory-list">無</span>
        </div>
    </div>

    <!-- 音效與 BGM (可替換) -->
    <audio id="bgm" loop>
        <source src="https://ia800109.us.archive.org/30/items/DarkAmbient_728/DarkAmbient.mp3" type="audio/mpeg">
    </audio>

    <div id="prologue-overlay" style="display: none;">
        <div id="skip-btn" onclick="skipPrologue()">SKIP >></div>
    </div>

    <script>
        // 優化影片循環效果：減少結尾重置時的閃爍感
        window.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('cover-video');
            if (video) {
                // 監控影片時間，在快結束前 0.5 秒開始淡出
                video.addEventListener('timeupdate', function() {
                    const buffer = 0.5;
                    if (video.duration - video.currentTime < buffer) {
                        video.style.opacity = '0';
                        video.style.transition = 'opacity 0.5s ease';
                    } else if (video.currentTime < buffer) {
                        video.style.opacity = '1';
                    }
                });

                // 影片結束時瞬間回到開頭並重新播放，同時恢復透明度
                video.onended = function() {
                    video.currentTime = 0.1; // 避開可能存在的檔案頭部空白
                    video.play();
                    video.style.opacity = '1';
                };
            }
        });
    </script>
    <script src="game.js"></script>
</body>
</html>
