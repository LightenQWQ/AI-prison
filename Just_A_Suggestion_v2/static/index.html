<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just a Suggestion | 只是一個建議</title>
    <link rel="stylesheet" href="style_v21_final.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
</head>
    <!-- 全域降雨效果層 -->
    <canvas id="rain-canvas" style="position: fixed; inset: 0; z-index: 600; pointer-events: none; opacity: 0.4;"></canvas>

    <!-- 全域音效控制面板 -->
    <div id="audio-panel" style="
        position: fixed; top: 25px; left: 35px; z-index: 9999;
        font-family: 'Courier New', monospace; font-size: 0.75rem;
        letter-spacing: 3px; user-select: none;
    ">
        <!-- 主按鈕 -->
        <div id="audio-toggle-btn" onclick="toggleAudioPanel()" style="
            color: rgba(255,255,255,0.4); cursor: pointer;
            border: 1px solid transparent; padding: 5px 10px;
            transition: all 0.3s; text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0,0,0,0.9);
        " onmouseover="this.style.color='#fff'; this.style.borderColor='rgba(255,255,255,0.4)';"
           onmouseout="this.style.color='rgba(255,255,255,0.4)'; this.style.borderColor='transparent';">
            ♪ AUDIO
        </div>

        <!-- 展開的控制面板 -->
        <div id="audio-controls-panel" style="
            display: none; margin-top: 6px;
            background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.12);
            padding: 14px 16px; backdrop-filter: blur(6px);
            min-width: 200px;
        ">
            <!-- 靜音開關 -->
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
                <span style="color: rgba(255,255,255,0.5);">MUTE</span>
                <div id="mute-btn" onclick="toggleAudio()" style="
                    color: #88cc88; cursor: pointer; letter-spacing: 2px;
                    border: 1px solid rgba(136,204,136,0.4); padding: 2px 8px;
                    transition: all 0.3s; font-size: 0.7rem;
                ">ON</div>
            </div>

            <div style="width: 100%; height: 1px; background: rgba(255,255,255,0.08); margin-bottom: 12px;"></div>

            <!-- BGM 音量 -->
            <div style="margin-bottom: 10px;">
                <div style="color: rgba(255,255,255,0.4); margin-bottom: 5px; font-size: 0.7rem;">
                    BGM &nbsp;<span id="bgm-vol-label" style="color:rgba(255,255,255,0.6)">30%</span>
                </div>
                <input id="bgm-slider" type="range" min="0" max="100" value="30"
                    oninput="setBgmVolume(this.value)"
                    style="width: 100%; accent-color: #aaa; cursor: pointer; height: 3px;">
            </div>

            <!-- 雨聲音量 -->
            <div>
                <div style="color: rgba(255,255,255,0.4); margin-bottom: 5px; font-size: 0.7rem;">
                    RAIN &nbsp;<span id="rain-vol-label" style="color:rgba(255,255,255,0.6)">50%</span>
                </div>
                <input id="rain-slider" type="range" min="0" max="100" value="50"
                    oninput="setRainVolume(this.value)"
                    style="width: 100%; accent-color: #aaa; cursor: pointer; height: 3px;">
            </div>
        </div>
    </div>

    <!-- [新增] 前置入口：解鎖音訊並進入夢境 -->
    <div id="pre-entry" style="
        position: fixed; inset: 0; z-index: 10000;
        background: #000; display: flex; align-items: center; justify-content: center;
        transition: opacity 2s ease-in-out;
    ">
        <button onclick="enterDream()" style="
            background: transparent; border: 1px solid rgba(255,255,255,0.2);
            color: #888; padding: 15px 40px; cursor: pointer;
            letter-spacing: 10px; font-family: 'EB Garamond', serif;
            font-size: 1.2rem; transition: all 0.8s;
        " onmouseover="this.style.color='#fff'; this.style.borderColor='#fff';" onmouseout="this.style.color='#888'; this.style.borderColor='rgba(255,255,255,0.2)';">
            [ 進入夢境 ]
        </button>
    </div>

    <div id="overlay">
        <!-- 全螢幕背景影片序列 -->
        <video id="cover-video" muted playsinline style="
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
            filter: brightness(0.6) contrast(1.1);
        ">
            <source src="assets/1.0.mp4" type="video/mp4">
        </video>

        <!-- 腦內聲音雜訊：局部掃描線效果 (位於畫面中上方) -->
        <div class="consciousness-glitch" style="
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            width: 300px; height: 300px;
            background: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(255,255,255,0.03) 1px, rgba(255,255,255,0.03) 2px);
            z-index: 1; pointer-events: none;
            mask-image: radial-gradient(circle, black 30%, transparent 70%);
            mix-blend-mode: overlay;
        "></div>

        <!-- 畫面暈影 (Vignetting) -->
        <div style="
            position: absolute; inset: 0;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.7) 100%);
            z-index: 2; pointer-events: none;
        "></div>



        <!-- [文字錯位佈局] -->
        
        <!-- 左上角低語 -->
        <div style="
            position: absolute; top: 8vh; left: 6vw; z-index: 5;
            color: rgba(120, 120, 120, 0.5);
            font-family: 'EB Garamond', serif; font-style: italic;
            font-size: 0.85rem; letter-spacing: 5px;
            animation: text-float 8s ease-in-out infinite;
        ">那個聲音⋯⋯</div>

        <!-- 右下角回響 -->
        <div style="
            position: absolute; bottom: 12vh; right: 8vw; z-index: 5;
            color: rgba(120, 120, 120, 0.5);
            font-family: 'EB Garamond', serif; font-style: italic;
            font-size: 0.85rem; letter-spacing: 5px;
            animation: text-float 8s ease-in-out infinite reverse;
        ">⋯⋯是你，還是我？</div>

        <!-- 核心內容區 (初始隱藏，待 2.0 動畫開始時顯現) -->
        <div id="title-container" style="
            position: relative; z-index: 4;
            display: flex; flex-direction: column; align-items: center;
            height: 100%; width: 100%;
            opacity: 0; transition: opacity 3s ease-in-out;
            pointer-events: none; /* 防止動畫結束前誤觸按鈕 */
        ">
            <!-- [響應式標題] 寬屏單行，豎屏雙行 -->
            <div style="margin-top: 35vh; width: 100%; text-align: center; padding: 0 5vw; box-sizing: border-box;">
                <div class="title-ink-wrapper">
                    <h1 class="ink-title">
                        JUST A<br class="br-mobile"> SUGGESTION
                    </h1>
                </div>
            </div>

            <!-- [去框化按鈕] -->
            <div style="margin-top: auto; padding-bottom: 10vh;">
                <button class="btn-terminal" onclick="startGame()">
                    [ 深入雨夜 ]
                </button>
            </div>
        </div>
    </div>

    <div id="game-container" style="display: none; border: none; box-shadow: none; padding: 0; width: 100vw; height: 100vh; max-width: none; flex-direction: column;">
        <!-- 儀表板改為隱藏狀態，保留 DOM 供 JS 更新數據，但不再顯示 -->
        <header id="monitor-dashboard" style="display: none;"></header>

        <div id="scene-container" style="flex: 1; border: none; margin: 0; max-height: none; background: #000; position: relative;">
            <!-- 移除 OSD 條 -->
            <div id="monitor-osd-bar" style="display: none;"></div>
            
            <img id="scene-image" src="" alt="Game Scene" style="filter: contrast(1.1) brightness(0.9); object-fit: cover; width: 100%; height: 100%;">
            <div id="memory-fragment"></div>
            <div class="vignette" style="background: radial-gradient(ellipse, transparent 50%, rgba(0,0,0,0.7) 100%);"></div>
            <div id="noise-layer"></div>
            <div class="panel-border" style="display: none;"></div>

            <!-- ⭐ 台詞疊加在圖片上中間 -->
            <div id="dialogue-box" style="
                position: absolute;
                bottom: 18%;
                left: 50%;
                transform: translateX(-50%);
                width: 80%;
                text-align: center;
                background: linear-gradient(transparent, rgba(0,0,0,0.6) 30%, rgba(0,0,0,0.6) 70%, transparent);
                padding: 20px 40px;
                border-radius: 4px;
                z-index: 10;
            ">
                <div id="status-indicator" style="font-family: 'Courier New', monospace; font-size: 0.6rem; color: rgba(255,255,255,0.15); letter-spacing: 5px; margin-bottom: 6px;">[SYNCED]</div>
                <div id="speaker" style="font-family: 'Courier New', monospace; color: #888; font-size: 0.7rem; letter-spacing: 6px; margin-bottom: 10px; text-transform: uppercase;">青年</div>
                <p id="text-content" style="font-family: 'EB Garamond', serif; font-size: 1.4rem; line-height: 1.9; color: #ffffff; font-style: italic; text-shadow: 0 2px 12px rgba(0,0,0,1), 0 0 30px rgba(0,0,0,0.8); margin: 0;">......</p>
            </div>
        </div>

        <!-- ⭐ 旁白固定在底部 -->
        <p id="narrator-text" style="
            color: #c0c0c0;
            text-align: center;
            font-size: 0.95rem;
            letter-spacing: 2px;
            font-style: italic;
            padding: 14px 10%;
            min-height: 2.5em;
            line-height: 1.9;
            background: rgba(0,0,0,0.88);
            border-top: 1px solid rgba(255,255,255,0.08);
            margin: 0;
            text-shadow: 0 1px 6px rgba(0,0,0,1);
        "></p>

        <div id="input-area" style="width: 50%; max-width: 500px; margin: 0 auto 50px auto; border: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px 0;">
            <input type="text" id="suggestion-input" placeholder="在影子的深處，你正想著..." autocomplete="off" style="background: transparent; border: none; color: #fff; font-family: 'Courier New', monospace; font-size: 0.9rem; padding: 10px; width: 100%; outline: none; letter-spacing: 2px;">
            <button id="submit-btn" onclick="sendSuggestion()" style="background: transparent; border: none; color: #444; font-family: 'Courier New', monospace; letter-spacing: 4px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem;">Enter</button>
        </div>
        
        <div id="inventory-display" style="margin-top: 10px; font-size: 0.8rem; color: #555;">
            物品: <span id="inventory-list">無</span>
        </div>
    </div>

    <!-- 結局全螢幕覆蓋層 -->
    <div id="ending-screen" style="
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: #000; z-index: 9999; display: none; 
        flex-direction: column; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 3s ease-in-out;
        padding: 40px; box-sizing: border-box; text-align: center;
    ">
        <h1 id="ending-title-display" style="color: #fff; font-family: 'EB Garamond', serif; font-size: 2.5rem; letter-spacing: 10px; margin-bottom: 40px; text-shadow: 0 0 20px rgba(255,255,255,0.3);"></h1>
        <p id="ending-narrative-display" style="color: #ccc; font-family: 'Noto Sans TC', sans-serif; font-size: 1.1rem; line-height: 2.2; letter-spacing: 4px; max-width: 700px; white-space: pre-wrap; font-style: italic;"></p>
        <button onclick="location.reload()" style="margin-top: 60px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #888; padding: 10px 30px; cursor: pointer; letter-spacing: 6px; font-family: 'Courier New', monospace; text-transform: uppercase; transition: all 0.5s;">RESTART</button>
    </div>

    <!-- 音效完全由 game.js 的 SoundManager 控制 (Web Audio API) -->

    <div id="prologue-overlay" style="display: none;">
        <div id="skip-btn" onclick="skipPrologue()">SKIP >></div>
    </div>

    <script>
        // ── 開場動畫序列與音效自動化邏輯 ──
        window.audioUnlocked = false;
        window.introFinished = false;

        function enterDream() {
            const entry = document.getElementById('pre-entry');
            const video = document.getElementById('cover-video');
            
            // 1. 隱藏入口
            entry.style.opacity = '0';
            setTimeout(() => entry.style.display = 'none', 2000);

            // 2. 解鎖音訊並開始播放雨聲 (在 1.0 播放時就有雨聲)
            window.audioUnlocked = true;
            if (typeof SoundManager !== 'undefined') {
                if (!window.soundManager) window.soundManager = new SoundManager();
                window.soundManager.startRain();
                // 如果你希望 1.0 時也有音樂，可以取消註解下一行
                // window.soundManager.playBGM('intro');
            }

            // 3. 啟動 1.0 影片 (解除 muted 雖然不一定成功，但雨聲已由 SoundManager 播放)
            video.play();
        }

        const video = document.getElementById('cover-video');
        if (video) {
            video.onended = function() {
                console.log("1.0 Animation finished -> Transitioning to 2.0 Loop");
                video.src = "assets/2.0.mp4";
                video.loop = true;
                video.play();
                window.introFinished = true;
                
                // 進入 2.0 循環後，播放標題音樂
                if (window.audioUnlocked) {
                    if (typeof SoundManager !== 'undefined') {
                        if (!window.soundManager) window.soundManager = new SoundManager();
                        window.soundManager.playBGM('intro');
                    }
                }

                // 顯現標題與按鈕
                const titleContainer = document.getElementById('title-container');
                if (titleContainer) {
                    titleContainer.style.opacity = '1';
                    titleContainer.style.pointerEvents = 'auto';
                }
            };
        }
    </script>
    <!-- 工程監控面板 (Debug Panel) -->
    <div id="debug-toggle" onclick="toggleDebug()">⚙️ ENGINE INFO</div>
    <div id="debug-panel">
        <h3>ENGINE MONITOR v27.2</h3>
        <div class="debug-item"><span>MODEL:</span> <span id="debug-model">-</span></div>
        <div class="debug-item"><span>LATENCY:</span> <span id="debug-latency">-</span>s</div>
        <div class="debug-item"><span>STATUS:</span> <span id="debug-status">IDLE</span></div>
        <hr>
        <div class="debug-item"><span>FINAL PROMPT:</span></div>
        <div id="debug-prompt">Waiting for input...</div>
        <div id="debug-error" style="color: #ff4444; margin-top: 10px; font-size: 10px; display: none;"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
