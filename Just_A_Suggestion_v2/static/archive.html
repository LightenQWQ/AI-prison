<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Archives | Just a Suggestion</title>
    <meta name="description" content="只是一個建議 — 封存所有階段的記憶與結局。">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌧</text></svg>">
    <link rel="stylesheet" href="style_v21_final.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #010101;
            color: #d0d0d0;
            overflow-y: auto !important;
            overflow-x: hidden;
            font-family: 'EB Garamond', 'Noto Sans TC', serif;
            margin: 0;
            padding: 0;
            height: auto !important;
            display: block !important;
        }

        .header {
            padding: 40px 20px;
            text-align: center;
            background: #000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2rem;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin: 0;
            color: #fff;
        }
        .header-sub {
            color:#555; 
            margin-top:10px; 
            letter-spacing:5px; 
            font-size:0.75rem;
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #666;
            padding: 8px 15px;
            cursor: pointer;
            letter-spacing: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            transition: all 0.3s;
            text-decoration: none;
        }
        .back-btn:hover {
            color: #fff;
            border-color: #fff;
        }

        .archive-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 方框清單樣式 */
        .archive-item {
            display: flex;
            background: #0a0a0a;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 15px;
            gap: 25px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }
        .archive-item:hover {
            background: #111;
            border-color: rgba(255,255,255,0.2);
            transform: translateX(10px);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .archive-thumb-wrap {
            width: 240px;
            height: 135px;
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .archive-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) contrast(1.1);
            transition: transform 0.6s, filter 0.6s;
        }
        .archive-item:hover .archive-thumb {
            transform: scale(1.05);
            filter: grayscale(0.5) contrast(1.1);
        }

        .archive-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .archive-title {
            font-size: 1.4rem;
            color: #fff;
            letter-spacing: 4px;
            margin-bottom: 8px;
        }
        .archive-meta {
            font-family: 'Courier New', monospace;
            font-size: 0.7rem;
            color: #444;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }
        .archive-summary {
            font-size: 0.95rem;
            color: #888;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-style: italic;
        }

        /* 全頁報告樣式 (取代舊版 Modal) */
        #detail-view {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .detail-header {
            margin-bottom: 40px;
            text-align: center;
        }
        .detail-back-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #888;
            padding: 8px 15px;
            cursor: pointer;
            letter-spacing: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            transition: all 0.3s;
            margin-bottom: 30px;
            display: inline-block;
            text-decoration: none;
        }
        .detail-back-btn:hover {
            color: #fff;
            border-color: #fff;
        }
        
        /* report.html 卡片樣式 */
        .report-card { 
            background: #1a1a1a; 
            border: 1px solid #333; 
            border-radius: 8px; 
            padding: 20px; 
            margin-bottom: 30px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); 
        }
        .turn-header { 
            font-size: 1.2em; 
            font-weight: bold; 
            color: #888; 
            margin-bottom: 15px; 
            border-bottom: 1px solid #333; 
            padding-bottom: 5px; 
            font-family: 'Courier New', monospace;
        }
        .player-msg { 
            color: #4CAF50; 
            font-weight: bold; 
            font-size: 1.1em; 
            margin-bottom: 15px; 
            background: rgba(76, 175, 80, 0.1); 
            padding: 10px; 
            border-radius: 4px; 
            border-left: 4px solid #4CAF50; 
        }
        .ai-dialogue { 
            color: #fff; 
            font-size: 1.1em; 
            margin-bottom: 15px; 
            padding-left: 15px; 
            border-left: 3px solid #666; 
            font-style: italic;
        }
        .ai-narration { 
            color: #aaa; 
            font-size: 0.95em; 
            margin-bottom: 20px; 
            line-height: 1.6;
        }
        .meta-info { 
            font-size: 0.85em; 
            color: #888; 
            background: #000; 
            padding: 10px; 
            border-radius: 4px; 
            display: inline-block; 
            font-family: 'Courier New', monospace;
        }
        .game-image { 
            width: 100%; 
            max-width: 100%; 
            height: auto; 
            border-radius: 4px; 
            margin-top: 20px; 
            border: 1px solid #444; 
            filter: grayscale(0.8) contrast(1.1);
        }
        .ending-card { 
            background: #2a0a0a; 
            border-color: #ff4444; 
        }
        
        .retro-text {
            color: #b0a080;
            background: rgba(255,255,255,0.03);
            border-left: 2px solid rgba(255,255,255,0.1);
            padding: 20px;
            font-style: italic;
            line-height: 1.8;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-btn"><< RETURN</a>
        <h1>THE ARCHIVES</h1>
        <div class="header-sub">RECORDS OF THE RAIN</div>
    </div>

    <div class="archive-container" id="archive-list">
        <!-- 清單會由 archive.js 動態注入 -->
        <div style="text-align:center; color:#666; margin-top:100px; letter-spacing:3px;">
            LOADING RECORDS...
        </div>
    </div>

    <!-- 全頁面報告模式 -->
    <div id="detail-view">
        <div class="detail-header">
            <button class="detail-back-btn" onclick="closeDetail()"><< BACK TO ARCHIVES</button>
            <h1 id="detail-title" style="font-size: 2rem; letter-spacing: 8px; color: #fff; margin-bottom: 10px;"></h1>
            <div id="detail-subtitle" style="color: #666; font-family: monospace; letter-spacing: 2px;"></div>
        </div>
        
        <div id="detail-body">
            <!-- 內容會由 archive.js 動態注入 (卡片列表) -->
        </div>
        
        <div style="text-align: center; margin-top: 50px; margin-bottom: 50px;">
            <button class="detail-back-btn" onclick="closeDetail()"><< BACK TO ARCHIVES</button>
        </div>
    </div>

    <script src="archive.js"></script>
</body>
</html>
