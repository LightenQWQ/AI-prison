<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《只是一個建議》前導測試版</title>
    <link rel="stylesheet" href="style.css?v=v12_5_sync_v8002">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container" class="intro-mode">
        <!-- BGM -->
        <audio id="bgm-player" loop>
            <source src="https://ia800109.us.archive.org/30/items/DarkAmbient_728/DarkAmbient.mp3" type="audio/mpeg">
        </audio>

        <!-- 狀態列 -->
        <header id="status-bar">
            <div class="stat">
                <label>信任值</label>
                <div class="bar-bg"><div id="trust-bar" class="bar-fill trust"></div></div>
            </div>
            <div class="stat">
                <label>恐懼值</label>
                <div class="bar-bg"><div id="fear-bar" class="bar-fill fear"></div></div>
            </div>
        </header>

        <!-- 物品欄 -->
        <div id="inventory-bar">
            <span>持有物品:</span>
            <div id="inventory-items">
                <span class="empty-inventory">無</span>
            </div>
        </div>

        <!-- 視覺呈現 (西方超低細節印象派分鏡) -->
        <div id="scene-display">
            <img id="scene-image" src="assets/intro_radio_v8.png" alt="Impressionist noir panel">

            <div id="vignette"></div>
            <!-- 黑白雜訊疊加層模擬不穩定的 AI 畫面 -->
            <div id="noise-overlay"></div>
        </div>

        <!-- 文字對話框 -->
        <div id="dialogue-box">
            <div id="username-display">引導者</div>
            <p id="npc-text">......</p>
        </div>


        <!-- 玩家輸入區 -->
        <div id="input-area">
            <input type="text" id="suggestion-input" placeholder="輸入你的回應... (他似乎還在昏迷，試著喚醒他？)" autocomplete="off">
            <button id="submit-btn">傳達</button>
        </div>
    </div>
    <script src="game.js?v=v12_5_sync_v8002"></script>
</body>
</html>
