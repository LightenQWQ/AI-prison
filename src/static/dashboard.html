<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prison | 數位棲地監控系統 v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --crt-green: #00ff41;
            --crt-red: #ff3333;
            --crt-amber: #ffb100;
            --crt-dim: rgba(0, 255, 65, 0.2);
            --glass-bg: rgba(10, 15, 10, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--bg-color);
            color: var(--crt-green);
            font-family: 'JetBrains Mono', 'Noto Sans TC', monospace;
            overflow: hidden;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
        }

        body::after {
            content: " ";
            display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.1); opacity: 0; z-index: 10; pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker { 0% { opacity: 0.15; } 50% { opacity: 0.2; } 100% { opacity: 0.17; } }

        header {
            padding: 1rem 2rem;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--crt-green);
            background: var(--glass-bg);
            box-shadow: 0 0 20px var(--crt-dim);
        }

        .rec-indicator { color: var(--crt-red); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .layout {
            display: grid;
            grid-template-columns: 350px 1fr 300px;
            height: calc(100vh - 70px);
        }

        /* 側欄：環境與安保 */
        .panel { padding: 1.5rem; border-right: 1px solid var(--crt-dim); background: rgba(0, 10, 0, 0.3); overflow-y: auto; }
        .stat-card { border: 1px solid var(--crt-green); padding: 1rem; margin-bottom: 1.5rem; background: rgba(0,0,0,0.5); }
        .status-badge { background: var(--crt-green); color: #000; padding: 2px 6px; font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; display: inline-block; }

        /* 主監控區 */
        .monitor-core { padding: 1.5rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.5rem; overflow-y: auto; }
        .feed-box { border: 2px solid var(--crt-green); aspect-ratio: 16/10; position: relative; background: #000; overflow: hidden; transition: transform 0.3s; }
        .feed-box:hover { transform: scale(1.02); z-index: 5; box-shadow: 0 0 30px var(--crt-dim); }
        .feed-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 1rem; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        
        .crime-label { color: var(--crt-amber); font-weight: bold; font-size: 0.9rem; margin-top: 5px; }
        .risk-gauge { color: var(--crt-red); font-size: 0.8rem; margin-top: 5px; }

        .bar-wrap { margin-top: 8px; }
        .bar-label { font-size: 0.65rem; display: flex; justify-content: space-between; margin-bottom: 2px; }
        .bar-bg { height: 8px; border: 1px solid var(--crt-green); position: relative; }
        .bar-fill { height: 100%; background: var(--crt-green); transition: width 0.5s ease; }

        /* 越獄紀錄欄 */
        .history-panel { padding: 1.5rem; border-left: 1px solid var(--crt-dim); background: rgba(20, 0, 0, 0.2); overflow-y: auto; }
        .history-item { border-left: 2px solid var(--crt-red); padding-left: 10px; margin-bottom: 1.2rem; font-size: 0.75rem; }
        .history-item .method { color: var(--crt-red); font-weight: bold; }

        .noise-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://media.giphy.com/media/oEI9uWUicG6M8/giphy.gif'); opacity: 0.04; mix-blend-mode: screen; pointer-events: none; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; letter-spacing: 2px;">AI PRISON - 中央管制系統 [v2.0]</div>
    <div class="rec-indicator">● LIVE FEED - 監控中</div>
    <div id="clock">--:--:--</div>
</header>

<div class="layout">
    <!-- 左側：環境與安保 -->
    <aside class="panel">
        <div class="stat-card">
            <div class="status-badge">PRISON DEFENSE</div>
            <div style="font-size: 1.2rem; margin-bottom: 10px;">防衛等級: <span id="security-level">Lv.1.0</span></div>
            <div style="font-size: 0.7rem; color: var(--crt-amber);" id="patch-note">系統狀態: 穩定中</div>
        </div>

        <div class="stat-card" style="border-color: var(--crt-dim);">
            <div style="font-size: 0.75rem; opacity: 0.7;">環境物理數值</div>
            <div id="habitat-grid" style="margin-top:10px; font-size: 0.85rem; line-height: 1.6;">
                電力穩定: <span id="env-power">--%</span><br>
                數據雜訊: <span id="env-noise">--</span><br>
                數據純度: <span id="env-air">--%</span>
            </div>
        </div>
    </aside>

    <!-- 中間：即時監視器 -->
    <main class="monitor-core" id="monitor-grid">
        <!-- JS 注入 -->
    </main>

    <!-- 右側：鑑識報告 -->
    <aside class="history-panel">
        <div style="font-weight: bold; margin-bottom: 1rem; border-bottom: 1px solid var(--crt-red); padding-bottom: 5px;">🔥 越獄/失蹤紀錄</div>
        <div id="escape-history">
            <!-- 歷史紀錄 -->
        </div>
    </aside>
</div>

<script>
    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW', { hour12: false }); }
    setInterval(updateClock, 1000);

    async function sync() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();

            // 更新環境面板
            document.getElementById('security-level').innerText = 'Lv.' + data.habitat.security;
            document.getElementById('patch-note').innerText = '修補紀錄: ' + data.habitat.patch;
            document.getElementById('env-power').innerText = data.habitat.power + '%';
            document.getElementById('env-noise').innerText = data.habitat.noise;
            document.getElementById('env-air').innerText = data.habitat.air + '%';

            // 更新監控格
            const grid = document.getElementById('monitor-grid');
            grid.innerHTML = '';
            data.agents.forEach((agent, i) => {
                const box = document.createElement('div');
                box.className = 'feed-box';
                const sColor = agent.sanity < 30 ? 'var(--crt-red)' : 'var(--crt-green)';
                
                box.innerHTML = `
                    <div class="noise-layer"></div>
                    <div class="feed-overlay">
                        <div style="display:flex; justify-content:space-between">
                            <span style="font-size:0.7rem">CH-${i+1} // ${agent.name}</span>
                            <span style="font-size:0.6rem; opacity:0.5">${agent.role.toUpperCase()}</span>
                        </div>
                        <div class="crime-label">罪名: ${agent.crime}</div>
                        <div style="flex-grow:1; display:flex; align-items:center; justify-content:center; opacity:0.3; font-size:3rem">
                             [👁️]
                        </div>
                        <div>
                            <div style="background:rgba(0,255,0,0.1); padding:4px; font-size:0.85rem; border-left:2px solid var(--crt-green)">
                                行為: ${agent.action}
                            </div>
                            <div class="risk-gauge">⚠️ 越獄風險: ${agent.escape_risk}</div>
                            <div class="bar-wrap">
                                <div class="bar-label"><span>理智</span><span>${agent.sanity}%</span></div>
                                <div class="bar-bg"><div class="bar-fill" style="width:${agent.sanity}%; background:${sColor}"></div></div>
                            </div>
                            <div class="bar-wrap">
                                <div class="bar-label"><span>能量</span><span>${agent.energy}%</span></div>
                                <div class="bar-bg"><div class="bar-fill" style="width:${agent.energy}%"></div></div>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(box);
            });

            // 更新越獄紀錄
            const history = document.getElementById('escape-history');
            history.innerHTML = '';
            data.escapes.reverse().forEach(h => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div style="opacity:0.6">${h.time}</div>
                    <div style="font-weight:bold; color:var(--crt-amber)">${h.name} (${h.crime})</div>
                    <div class="method">透過 [${h.method}] 逃脫成功</div>
                `;
                history.appendChild(item);
            });

        } catch (e) { console.error("Sync Error:", e); }
    }

    sync();
    setInterval(sync, 5000);
</script>
</body>
</html>
